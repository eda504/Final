<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - All About Eda ✨</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container position-relative">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <span class="brand-regular">All About</span>
        <span class="brand-cursive ms-2">Eda</span>
      </a>
      <img src="images/logo.jpeg" class="navbar-logo position-absolute start-50 translate-middle-x" alt="Eda's cute silhouette logo" width="90" height="90">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="hobbies.html">Hobbies</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5 mt-5 bg-light-gray">
    <div class="container">
      <h1 class="text-center display-4 fw-bold mb-3" data-aos="fade-up">message me! 💌</h1>

      <div class="row justify-content-center">
        <div class="col-lg-6" data-aos="fade-up">
          
          <form id="contactForm" action="https://formspree.io/f/mqeyzrnq" method="POST">
            
            <input type="text" name="_gotcha" style="display:none">
            
            <input type="hidden" name="_next" value="https://yourdomain.com/contact.html?message=success">

            <div class="mb-4">
              <label class="form-label">your name ✨</label>
              <input type="text" name="name" class="form-control rounded-4" placeholder="type your name here.." required>
            </div>

            <div class="mb-4">
              <label class="form-label">email ✈️</label>
              <input type="email" name="email" class="form-control rounded-4" placeholder="you@email.com" required>
            </div>

            <div class="mb-4">
              <label class="form-label">message 🎧</label>
              <textarea name="message" class="form-control rounded-4" rows="6" placeholder="wow.. this is so cute!!" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-pink btn-lg w-100">send!!</button>
          </form>

          <div class="mt-5 text-center">
            <p>~ see you soon ~</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer text-white text-center py-5">
    <p class="mb-0">© 2026 Eda  💖</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ once: true, duration: 1200 });

    // SUCCESS ALERT LOGIC
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('message') === 'success') {
      alert("✨ YAY! Message sent successfully! 💖");
      window.history.replaceState(null, null, window.location.pathname);
    }

    // LOADING STATE FOR BUTTON
    document.getElementById('contactForm').addEventListener('submit', function() {
      const button = document.getElementById('submitBtn');
      button.innerHTML = 'sending... 💌';
      button.style.opacity = "0.7";
      button.disabled = true;
    });
  </script>
</body>
</html>
