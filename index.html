<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eda's Pink World 💖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ff8fab;
            --pink-light: #ffe6f7;
            --pink-dark: #c0267f;
        }
        body {
            background-color: var(--pink-light);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #5a2d4a;
        }
        .navbar {
            background-color: #ffb3e6 !important;
            box-shadow: 0 4px 15px rgba(255, 179, 230, 0.4);
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff3399 !important;
        }
        .nav-link {
            color: #ff3399 !important;
            font-weight: 600;
        }
        .nav-link:hover, .nav-link.active {
            color: #c0267f !important;
            text-decoration: underline wavy #ff8fab;
        }
        h1, h2 {
            color: #ff69b4;
            font-weight: 700;
        }
        .hero-img {
            border: 12px solid #ff99cc;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3);
            transition: transform 0.4s ease;
        }
        .hero-img:hover {
            transform: scale(1.03) rotate(1deg);
        }
        .intro-text {
            background-color: white;
            border-radius: 25px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(255, 179, 230, 0.4);
        }
        .heart {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <!-- NAV BAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">💖</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="hobbies.html">Hobbies</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO BIG PICTURE -->
    <div class="container my-5">
        <div class="text-center">
            <img src="picture.jpeg" 
                 alt="My photo 💕" 
                 class="hero-img img-fluid w-100" 
                 style="max-height: 650px; object-fit: cover;">
        </div>
    </div>

    <!-- INTRO PARAGRAPH -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="intro-text text-center">
                    <h1 class="display-4 mb-4">Hi, I'm Eda! 🌸✨</h1>
                    <p class="lead fs-4" style="line-height: 1.8;">
                        (will add later)
                    </p>
                    <p class="mt-4">
                        <span class="heart fs-1">💖</span>
                        <span class="heart fs-1 mx-3" style="animation-delay: 0.5s;">🌸</span>
                        <span class="heart fs-1">🎀</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5" style="background-color: #ffb3e6; color: #5a2d4a;">
        <p>💖</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
